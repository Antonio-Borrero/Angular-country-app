<section class="m-10 flex justify-center">
    <div class="w-full max-w-4xl bg-neutral rounded-2xl">
        <figure class="diff aspect-video rounded-2xl" tabindex="0">
            <div class="diff-item-1 bg-neutral" role="img" tabindex="0">
                <div class="flex justify-around items-center">
                    <div class="flex flex-col gap-5">
                        <h1 class="text-5xl">{{country().name}}</h1>
                        <h2 class="text-2xl">Capital: {{country().capital}}</h2>
                        <h2 class="text-2xl">Población: {{country().population | number}}</h2>
                        <h2 class="text-2xl">Region: {{country().region}}</h2>
                        <h2 class="text-2xl">Sub region: {{country().subRegion}}</h2>
                    </div>
                    <div class="w-100">
                        <img [src]="country().flag" [alt]="country().name" class="rounded-xl">
                    </div>
                </div>
            </div>
            <div class="diff-item-2" role="img">
                <img [src]="country().flag" [alt]="country().name">
            </div>
            <div class="diff-resizer"></div>
        </figure>
    </div>
</section>
<section class="flex justify-center">
    <button class="btn btn-primary" (click)="goBack()">Regresar</button>
</section>
